name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile.cloud"
      - ".dockerignore.cloud"
      - "deploy/task-definition.json"
      - "tests/**"
      - ".github/workflows/deploy-aws.yml"
  workflow_dispatch:

concurrency:
  group: deploy-aws
  cancel-in-progress: false

jobs:
  # Deep real-API gate. Spins up the freshly-built server locally and runs the
  # full e2e suite (every tool + batch/crawl polling + error handling) against
  # it. If anything fails, `deploy` never runs — bad code cannot reach clients.
  e2e-gate:
    name: E2E gate (full real-API suite)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "lts/*"
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Start MCP server (HTTP mode)
        run: |
          TRANSPORT=http PORT=3000 node build/index.js &
          echo "MCP_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null; then
              echo "server healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::server did not become healthy in 30s"
          exit 1
      - name: Full e2e suite
        env:
          OLOSTEP_API_KEY: ${{ secrets.OLOSTEP_TEST_API_KEY }}
          MCP_URL: http://localhost:3000/mcp
        run: npm run test:e2e
      - name: Stop MCP server
        if: always()
        run: kill "$MCP_PID" 2>/dev/null || true

  deploy:
    name: Build & deploy to ECS
    runs-on: ubuntu-latest
    needs: e2e-gate # deploy is blocked unless the full e2e suite passed
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: us-east-1
      ECR_REPO: olostep-mcp-server
      CLUSTER: olostep-mcp
      SERVICE: olostep-mcp-service
      CONTAINER_NAME: olostep-mcp-server
      DOCKERHUB_REPO: olostep/mcp-server
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::442042530275:role/GitHubActionsMcpDeploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        run: |
          IMG="${{ steps.ecr.outputs.registry }}/${ECR_REPO}"
          SHA="${GITHUB_SHA::12}"
          docker build -f Dockerfile.cloud --platform linux/amd64 \
            -t "$IMG:$SHA" -t "$IMG:latest" .
          docker push "$IMG:$SHA"
          docker push "$IMG:latest"
          echo "image=$IMG:$SHA" >> "$GITHUB_OUTPUT"

      # Keep the public Docker Hub image (what the README tells users to pull)
      # in sync with what we deploy. Skipped if Docker Hub creds aren't set —
      # add DOCKERHUB_USERNAME + DOCKERHUB_TOKEN repo secrets to enable.
      - name: Push image to Docker Hub
        if: env.DOCKERHUB_TOKEN != ''
        run: |
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          ECR_IMG="${{ steps.ecr.outputs.registry }}/${ECR_REPO}"
          SHA="${GITHUB_SHA::12}"
          docker tag "$ECR_IMG:$SHA" "$DOCKERHUB_REPO:$SHA"
          docker tag "$ECR_IMG:$SHA" "$DOCKERHUB_REPO:latest"
          docker push "$DOCKERHUB_REPO:$SHA"
          docker push "$DOCKERHUB_REPO:latest"

      - name: Render task definition
        id: taskdef
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: deploy/task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.taskdef.outputs.task-definition }}
          cluster: ${{ env.CLUSTER }}
          service: ${{ env.SERVICE }}
          wait-for-service-stability: true

      - name: Setup Node for production canary
        uses: actions/setup-node@v5
        with:
          node-version: "lts/*"

      - name: Production canary (live mcp.olostep.com)
        env:
          OLOSTEP_TEST_API_KEY: ${{ secrets.OLOSTEP_TEST_API_KEY }}
        run: node tests/smoke.mjs remote --url https://mcp.olostep.com/mcp
